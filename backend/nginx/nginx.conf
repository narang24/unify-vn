# ─────────────────────────────────────────────────────────────────────────────
# Unify API Gateway — Nginx Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Port layout:
#   :8000  ← nginx gateway   (this file, single entry point for the frontend)
#   :8001  ← auth service    (services/auth/src/index.ts)
#   :8002  ← workspace svc   (services/workspace/src/index.ts)
#
# Usage (Windows):
#   1. Download nginx for Windows: https://nginx.org/en/download.html
#   2. Copy this file into the nginx/conf/ directory
#   3. Run: nginx -c /path/to/this/nginx.conf
#      OR use the helper: backend/nginx/start-nginx.bat
# ─────────────────────────────────────────────────────────────────────────────

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log  logs/access.log;
    error_log   logs/error.log warn;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/javascript;

    # ── Connection limits ──────────────────────────────────────────────────
    keepalive_timeout  65;
    client_max_body_size 10m;

    # ── Rate limiting zones ────────────────────────────────────────────────
    # Auth endpoints: 20 req/min per IP (strict — login/signup only)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
    # General API: 300 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=300r/m;

    # ── Upstream definitions ───────────────────────────────────────────────
    upstream auth_service {
        server 127.0.0.1:8001;
        keepalive 8;
    }

    upstream workspace_service {
        server 127.0.0.1:8002;
        keepalive 8;
    }

    # ── CORS helper macro ──────────────────────────────────────────────────
    map $http_origin $cors_origin {
        default                     "";
        "http://localhost:3000"     "http://localhost:3000";
        "http://localhost:3001"     "http://localhost:3001";
        # Add your production frontend URL here:
        # "https://app.unify.example.com"  "https://app.unify.example.com";
    }

    # ── Gateway server ─────────────────────────────────────────────────────
    server {
        listen 8000;
        server_name localhost;

        # CORS pre-flight
        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      $cors_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true'       always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, PATCH, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization, Cookie'    always;
                add_header 'Access-Control-Max-Age'           3600         always;
                add_header 'Content-Length'                   0;
                add_header 'Content-Type'                     'text/plain; charset=utf-8';
                return 204;
            }
            return 404 '{"error":"Not found"}';
        }

        # ── Health check for the gateway itself ─────────────────────────
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"service":"api-gateway","status":"ok","port":8000}';
        }

        # ── Auth Service  →  :8001 ──────────────────────────────────────
        # Matches: /api/v1/auth/*
        location ^~ /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_req_status 429;

            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;

            proxy_pass         http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Forward cookies so the HttpOnly refresh_token reaches the auth service
            proxy_pass_header  Set-Cookie;
            proxy_cookie_path  / /;
        }

        # OAuth callbacks also go to auth service (exact match without trailing slash)
        location ^~ /api/v1/auth {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_req_status 429;

            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;

            proxy_pass         http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_pass_header  Set-Cookie;
        }

        # ── Workspace Service  →  :8002 ─────────────────────────────────
        # Matches: /api/v1/* (everything that didn't match auth above)
        location ^~ /api/v1/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_req_status 429;

            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;

            proxy_pass         http://workspace_service;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_pass_header  Set-Cookie;
        }
    }
}
